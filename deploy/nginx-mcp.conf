# patent-client-agents MCP server — TLS termination and reverse proxy.
#
# Replace `mcp.example.com` with the deployed hostname (see DEPLOYMENT.md).
# Co-tenants: if the same host also serves the law-tools MCP server, add its
# `location /law_tools/ {...}` block alongside the /patent-client-agents/ one below.

server {
    listen 80;
    server_name mcp.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.example.com;

    ssl_certificate /etc/letsencrypt/live/mcp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # patent-client-agents MCP server
    location /patent-client-agents/ {
        rewrite ^/patent-client-agents(/.*)$ $1 break;
        rewrite ^/patent-client-agents$ / break;

        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        default_type application/json;
        return 404 '{"error": "Not found. Available paths: /patent-client-agents/"}';
    }
}
