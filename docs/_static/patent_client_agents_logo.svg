  <!--
    v6 — rebuilt on the parent's coordinate system.

    Source: parkerhancock/patent_client/old_docs/source/logo/patent_client_full_logo.svg
    (Inkscape, live Mohave Regular text, lightbulb + frame).

    Changes from parent:
      - viewBox width expanded 211.67 -> 290 to fit "AGENTS".
      - Color: #008cc8 -> #0b4a6e (navy primary).
      - "AGENTS" added after "PATENT CLIENT", painted in #19c6d6 (cyan accent).
      - TM mark retained, navy.
      - Frame retained — it is, on reflection, a load-bearing piece of
        the parent's identity.

    What's preserved:
      - Font: Mohave (no weight override = Regular, same as parent).
      - Effective font size (32px nominal, same as parent).
      - Bulb paths at native scale — every path byte-identical to parent.
      - Frame stroke weight (2.1538), proportions, corner radius (0).
  -->

